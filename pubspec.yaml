name: sankey_diagram_flutter
description: >-
  A highly customizable Sankey diagram widget for Flutter. Visualize broker
  distribution, fund flows, and any flow-based data with smooth bezier curves
  and full interactivity.
version: 1.1.0
homepage: https://github.com/fanolans/sankey_diagram_flutter
repository: https://github.com/fanolans/sankey_diagram_flutter

topics:
  - visualization
  - sankey
  - diagram
  - flutter
  - finance

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
